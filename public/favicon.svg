<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Fundo preto padrão -->
  <rect width="512" height="512" rx="128" fill="#020617"/>
  
  <!-- Fundo com gradiente sutil superposto -->
  <rect width="512" height="512" rx="128" fill="url(#bg-grad)" opacity="0.4"/>

  <!-- Sombra das formas da carteira para dar profundidade -->
  <g filter="url(#shadow)">
    <!-- Corpo da Carteira -->
    <path d="M120 180 C120 157.9 137.9 140 160 140 L392 140 C414.1 140 432 157.9 432 180 L432 372 C432 394.1 414.1 412 392 412 L120 412 Z" fill="url(#wallet-base)" />
    
    <!-- Abas / Bolsos da carteira -->
    <path d="M120 220 L350 220 C372.1 220 390 237.9 390 260 L390 412 L120 412 Z" fill="url(#wallet-front)" />
  </g>

  <!-- Detalhe de cartões saindo da carteira -->
  <!-- Cartão Superior (Acento mais claro) -->
  <rect x="150" y="100" width="160" height="80" rx="12" fill="url(#card-1)"/>
  <!-- Cartão Inferior (Acento principal) -->
  <rect x="180" y="115" width="160" height="90" rx="12" fill="url(#card-2)"/>

  <!-- Brilho / Detalhe Fecho -->
  <rect x="360" y="260" width="24" height="48" rx="12" fill="#ffffff" opacity="0.9"/>
  <circle cx="372" cy="284" r="6" fill="#1e293b"/>

  <defs>
    <!-- Gradiente do fundo -->
    <linearGradient id="bg-grad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3b82f6" opacity="0.3"/>
      <stop offset="1" stop-color="#8b5cf6" opacity="0.1"/>
    </linearGradient>

    <!-- Gradiente da base da carteira -->
    <linearGradient id="wallet-base" x1="120" y1="140" x2="432" y2="412" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>

    <!-- Gradiente da parte frontal da carteira -->
    <linearGradient id="wallet-front" x1="120" y1="220" x2="390" y2="412" gradientUnits="userSpaceOnUse">
      <stop stop-color="#334155"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>

    <!-- Gradientes dos cartões -->
    <linearGradient id="card-1" x1="150" y1="100" x2="310" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#6d28d9"/>
    </linearGradient>
    
    <linearGradient id="card-2" x1="180" y1="115" x2="340" y2="205" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>

    <!-- Filtro de sombra suave -->
    <filter id="shadow" x="100" y="120" width="352" height="312" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity="0.3"/>
    </filter>
  </defs>
</svg>
