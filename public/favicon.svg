<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Black rounded background -->
  <rect width="512" height="512" rx="115" fill="#000000"/>

  <!-- Wallet body — thick white strokes, slightly smaller/centered -->
  <!-- Main wallet rectangle -->
  <rect x="96" y="188" width="320" height="200" rx="30" fill="none" stroke="#ffffff" stroke-width="26" stroke-linejoin="round"/>

  <!-- Wallet top flap / card area -->
  <rect x="144" y="130" width="196" height="106" rx="22" fill="none" stroke="#ffffff" stroke-width="22" stroke-linejoin="round"/>

  <!-- Coin pocket / clasp on right side -->
  <circle cx="360" cy="288" r="34" fill="none" stroke="#ffffff" stroke-width="22"/>
  <circle cx="360" cy="288" r="12" fill="#ffffff"/>
</svg>
