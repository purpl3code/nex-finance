<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Black rounded background -->
  <rect width="512" height="512" rx="115" fill="#000000"/>

  <!-- Card peeking from top of wallet -->
  <rect x="162" y="102" width="175" height="112" rx="36"
        fill="none" stroke="#ffffff" stroke-width="32"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Main wallet body -->
  <rect x="84" y="182" width="344" height="218" rx="46"
        fill="none" stroke="#ffffff" stroke-width="34"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Coin pocket – clean circle, no fill dot -->
  <circle cx="362" cy="291" r="33"
          fill="none" stroke="#ffffff" stroke-width="28"
          stroke-linecap="round"/>
</svg>
