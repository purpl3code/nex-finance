name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Java (Android SDK requires JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: |
          if [ -z "$VITE_SUPABASE_URL" ]; then echo "VITE_SUPABASE_URL is EMPTY"; else echo "VITE_SUPABASE_URL is set (length: ${#VITE_SUPABASE_URL})"; fi
          if [ -z "$VITE_SUPABASE_ANON_KEY" ]; then echo "VITE_SUPABASE_ANON_KEY is EMPTY"; else echo "VITE_SUPABASE_ANON_KEY is set (length: ${#VITE_SUPABASE_ANON_KEY})"; fi
          npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        run: cd android && ./gradlew assembleRelease
        env:
          ANDROID_VERSION_CODE: ${{ github.run_number }}
          ANDROID_VERSION_NAME: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '1.0.0-dev' }}

      - name: Rename APK
        run: |
          VERSION=${GITHUB_REF_NAME:-dev}
          mv android/app/build/outputs/apk/release/app-release.apk android/app/build/outputs/apk/release/nex-finance-${VERSION}.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: nex-finance-apk
          path: android/app/build/outputs/apk/release/nex-finance-*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/nex-finance-*.apk
          generate_release_notes: true
          body: |
            ## 📱 Nex Finance ${{ github.ref_name }}
            
            ### Como instalar
            1. Baixe o arquivo `.apk` abaixo
            2. No seu celular Android, abra o arquivo
            3. Caso peça, habilite "Instalar de fontes desconhecidas"
            4. Pronto! O app estará instalado
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
